# see: https://github.com/softprops/action-gh-release

name: BSARGeom Release

permissions:
  contents: write

on:
  push:
    tags:
      - '[0-9]+.*'

jobs:
  # Create the release (body + auto-generated notes) once, before the per-target
  # legs upload their assets — several jobs racing to create the same release
  # can drop the `generate_release_notes` output.
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body: |
            `BSARGeom` is a Rust 3D bistatic SAR geometry visualizer.
            For more details on this release see [CHANGELOG](./CHANGELOG.md).
          name: BSARGeom ${{ github.ref_name }} release
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  dist:
    name: dist (${{ matrix.target }})
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            # Build against glibc 2.28 for wide distribution compatibility
            # (see: https://github.com/pypa/manylinux)
            container: quay.io/pypa/manylinux_2_28_x86_64
          - os: macos-latest
            # Intel binary, cross-compiled from the arm64 runner
            target: x86_64-apple-darwin
          - os: macos-latest
            # Apple Silicon binary (macos-latest runners are arm64)
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install rustup (Linux container)
        if: ${{ matrix.container }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Rust toolchain
        run: |
          rustup update --no-self-update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      # `cargo xtask dist` builds the release binary and produces the platform
      # installer(s) + archive under target/dist:
      #   Windows -> zip archive + embedded .exe installer
      #   Linux   -> makeself .run installer + tar.gz archive
      #   macOS   -> BSARGeom.app bundle in a tar.gz (per-arch)
      # XTASK_TARGET selects the build triple so the arm64 macOS runner can also
      # cross-build the x86_64-apple-darwin bundle (see xtask::dist_target).
      - name: Build installers (cargo xtask dist)
        shell: bash
        env:
          XTASK_TARGET: ${{ matrix.target }}
        run: cargo xtask dist

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: target/dist/*
          body: |
            `BSARGeom` is a Rust 3D bistatic SAR geometry visualizer.
            For more details on this release see [CHANGELOG](./CHANGELOG.md).
          name: BSARGeom ${{ github.ref_name }} release
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
